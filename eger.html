<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Eger szállások</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .hotel-card {
            display: flex;
            gap: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .hotel-card:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .hotel-img {
            width: 250px;
            height: 160px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            font-size: 20px;
            font-weight: bold;
            color: #0d6efd;
        }

        .favorite {
            cursor: pointer;
            font-size: 22px;
        }
    </style>
</head>

    <h1 class="mb-4">Eger szállások</h1>
    <div id="hotels"></div>
    <a href="kedvencek.html" class="btn btn-primary mt-3">❤️ Kedvencek</a>

            { "id": 80, "name": "Grand Eger Hotel", "price": 36990, "stars": 5, "img": "https://www.ittjartam.hu/eger/szallasok/hotel-villa-volgy/hotel-villa-volgy-205941-255x280.webp", "street": "Grand tér 8" }
        ];

        function renderHotels() {
            const container = document.getElementById("hotels");
            hotels.forEach(h => {
                let stars = "⭐".repeat(h.stars);
                container.innerHTML += `
        <div class="hotel-card">
            <img src="${h.img}" class="hotel-img">
            <div class="flex-grow-1">
                <h5>${h.name}</h5>
                <div class="text-warning">${stars}</div>
                <p>Cím: ${h.street}</p>
                <div class="price">${h.price} Ft / éj</div>
            </div>
            <div>
                <i class="bi bi-heart favorite" onclick="toggleFav('${h.name}', ${h.price}, '${h.img}')"></i>
            </div>
        </div>`;
            });
        }

        function toggleFav(name, price, img) {
            let favs = JSON.parse(localStorage.getItem("favs")) || [];
            let index = favs.findIndex(f => f.name === name);
            if (index > -1) { favs.splice(index, 1); alert("Eltávolítva"); }
            else { favs.push({ name, price, img }); alert("Hozzáadva"); }
            localStorage.setItem("favs", JSON.stringify(favs));
        }

        renderHotels();
    </script>
    <footer id="js-footer"></footer>

</body>
