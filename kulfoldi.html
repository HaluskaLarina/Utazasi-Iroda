<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>🌍 20 Utazási Ajánlat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #6699cc;
            margin: 0;
            padding: 0;
        }

        /* nagy box a tartalomnak */
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        /* cimsorok */
        .section h2 {
            background: #333;
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* kartya racs */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* egyik kartya */
        .card {
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        /* kep a kartyaban */
        .card-img-top {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        /* cim */
        .card-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        /* csillagok */
        .rating {
            color: #ffcc00;
            font-size: 20px;
            margin-bottom: 10px;
        }

        /* orszag */
        .country {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        /* kategoria cimke */
        .category {
            background: #6699cc;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* ar */
        .price {
            color: #e74c3c;
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }

        /* foglalas gomb */
        .btn-foglal {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn-foglal:hover {
            background: #cc3333;
        }

        /* betoltes szoveg */
        .loading {
            text-align: center;
            padding: 100px;
            color: #666;
            font-size: 18px;
        }

        /* hiba uzenet */
        .error {
            background: #e74c3c;
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin: 20px;
        }

        /* mobil nezet */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .container {
                margin: 10px;
                padding: 15px;
            }
        }
    </style>
</head>

<body>
    <header id="js-navbar"></header>
    <div class="container">
        <div id="loading" class="loading">
            <div class="spinner-border text-light" style="width:3rem;height:3rem" role="status"></div>
            <div class="mt-3">Utazási ajánlatok betöltése...</div>
        </div>
        <div id="error" class="error" style="display:none">
            <h3>❌ Hiba történt!</h3>
            <p>helyek.json fájl nem található. Ellenőrizd a fájl nevét és helyét!</p>
        </div>
        <div id="content"></div>
    </div>

    <script>
        let helyek = [];
        let szurtHelyek = [];

        async function helyekBetoltese() {
            try {
                document.getElementById('loading').innerHTML = '📡 JSON betöltés...';
                const response = await fetch('./db/helyek.json');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                helyek = await response.json();
                szurtHelyek = [...helyek];

                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                helyekMegjelenites();
                console.log(`✅ ${helyek.length} hely betöltve`);

            } catch (error) {
                console.error('Helyek betöltési hiba:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        function helyekMegjelenites() {
            const content = document.getElementById('content');

            // Belföldi
            const belfold = szurtHelyek.filter(h => h.id.startsWith('B'));
            if (belfold.length) {
                content.innerHTML += createSection('🏰 Belföldi Célpontok', belfold);
            }

            // Külföldi
            const kulfold = szurtHelyek.filter(h => h.id.startsWith('K'));
            if (kulfold.length) {
                content.innerHTML += createSection('✈️ Külföldi Úticélok', kulfold);
            }
        }

        function createSection(cim, lista) {
            let html = `<div class="section">
        <h2>${cim} <span class="badge bg-light text-dark ms-3">${lista.length} ajánlat</span></h2>
        <div class="grid">`;

            lista.forEach(hely => {
                const ar = (Math.floor(Math.random() * 150000) + 10000).toLocaleString();
                html += `
        <div class="card h-100">
            <img src="${hely.poszter}" class="card-img-top" alt="${hely.hely}" loading="lazy">
            <div class="card-body d-flex flex-column">
                <h5 class="card-title">${hely.hely}</h5>
                <div class="rating mb-2">⭐ ${hely.ertekeles} (${hely.orszag})</div>
                <span class="category">${hely.kategoria}</span>
                <div class="price mt-auto">${ar} Ft / fő</div>
                <button class="btn-foglal w-100 mt-3" onclick="foglalas('${hely.id}','${hely.hely}')">
                    🛒 Foglalni szeretném
                </button>
            </div>
        </div>`;
            });

            html += '</div></div>';
            return html;
        }

        function foglalas(id, hely) {
            const helyAdat = helyek.find(h => h.id === id);
            alert(`🎉 Foglalás sikeres!\n\n🗺️ Célállomás: ${hely}\n⭐ Értékelés: ${helyAdat.ertekeles}\n🏷️ ID: ${id}`);
            console.log('Foglalás:', helyAdat);
        }

        document.addEventListener('DOMContentLoaded', helyekBetoltese);
    </script>
    <footer id="js-footer"></footer>
    <script src="script/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
