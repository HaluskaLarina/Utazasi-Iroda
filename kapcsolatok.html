<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Hajnal fodrász üzlet</title>
</head>

<body class="contact-page">
  <!-- Contact Section -->
        <section id="contact" class="section contact-section">
            <div class="section-container">
                <div class="section-header">
                    <span class="section-number">05</span>
                    <h2 class="section-title">
                        <span class="title-bracket">&lt;</span>
                        <span class="title-text" data-text-en="Contact" data-text-ar="التواصل">Contact</span>
                        <span class="title-bracket">/&gt;</span>
                    </h2>
                    <div class="section-line"></div>
                </div>
                
                <div class="contact-content">
                    <div class="contact-info">
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div class="contact-details">
                                <h4 class="contact-label" data-text-en="Email" data-text-ar="البريد الإلكتروني">Email</h4>
                                <a href="mailto:developer@example.com" class="contact-value">developer@example.com</a>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div class="contact-details">
                                <h4 class="contact-label" data-text-en="Phone" data-text-ar="الهاتف">Phone</h4>
                                <a href="tel:+966501234567" class="contact-value">+966 50 123 4567</a>
                            </div>
                        </div>
                        
                        <div class="contact-item">
                            <div class="contact-icon">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div class="contact-details">
                                <h4 class="contact-label" data-text-en="Location" data-text-ar="الموقع">Location</h4>
                                <span class="contact-value" data-text-en="Riyadh, Saudi Arabia" data-text-ar="الرياض، المملكة العربية السعودية">Riyadh, Saudi Arabia</span>
                            </div>
                        </div>
                    </div>
                    
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <input type="text" class="form-input" placeholder="Name" data-placeholder-en="Name" data-placeholder-ar="الاسم" required>
                        </div>
                        <div class="form-group">
                            <input type="email" class="form-input" placeholder="Email" data-placeholder-en="Email" data-placeholder-ar="البريد الإلكتروني" required>
                        </div>
                        <div class="form-group">
                            <input type="text" class="form-input" placeholder="Subject" data-placeholder-en="Subject" data-placeholder-ar="الموضوع" required>
                        </div>
                        <div class="form-group">
                            <textarea class="form-input form-textarea" rows="5" placeholder="Message" data-placeholder-en="Message" data-placeholder-ar="الرسالة" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-submit">
                            <span data-text-en="Send Message" data-text-ar="إرسال الرسالة">Send Message</span>
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer id="js-footer"></footer>

    
    <script src="script/script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
</body>

</html>
