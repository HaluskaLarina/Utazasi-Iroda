function renderHotels() {
    const container = document.getElementById("hotels");
    hotels.forEach(h => {
        let stars = "⭐".repeat(h.stars);
        container.innerHTML += `
        <div class="hotel-card">
            <img src="${h.img}" class="hotel-img">
            <div class="flex-grow-1">
                <h5>${h.name}</h5>
                <div class="text-warning">${stars}</div>
                <p>Cím: ${h.street}</p>
                <div class="price">${h.price} Ft / éj</div>
            </div>
            <div>
                <i class="bi bi-heart favorite" onclick="toggleFav('${h.name}', ${h.price}, '${h.img}')"></i>
            </div>
        </div>`;
    });
}

function toggleFav(name, price, img) {
    let favs = JSON.parse(localStorage.getItem("favs")) || [];
    let index = favs.findIndex(f => f.name === name);
    if (index > -1) { favs.splice(index, 1); alert("Eltávolítva"); }
    else { favs.push({name, price, img}); alert("Hozzáadva"); }
    localStorage.setItem("favs", JSON.stringify(favs));
}

renderHotels();
